name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (Robocop)
        run: robocop check .

      - name: Dry Run (Syntax Check)
        run: python -m robot --dryrun --outputdir results/dryrun tests/

  e2e:
    name: E2E — ${{ matrix.browser-label }}
    runs-on: ubuntu-latest
    needs: unit-tests
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            browser-label: Chromium Browsers
            install-deps: ''
          - browser: firefox
            browser-label: Firefox
            install-deps: ''
          - browser: webkit
            browser-label: WebKit Browsers
            install-deps: |
              node $(python -c "import Browser, os; print(os.path.join(os.path.dirname(Browser.__file__), 'wrapper', 'node_modules', '.bin', 'playwright'))") install-deps webkit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          rfbrowser init
          ${{ matrix.install-deps }}

      - name: Run Tests — ${{ matrix.browser-label }}
        run: |
          pabot --testlevelsplit \
            --listener allure_robotframework:results/allure \
            -d results \
            --variablefile resources/environments/prod.yaml \
            --variable HEADLESS:True \
            --variable BROWSER:${{ matrix.browser }} \
            tests/

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-report-${{ matrix.browser }}
          path: results/
